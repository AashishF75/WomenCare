<!DOCTYPE html>

<html>
<head>
<title>Crime Safety Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial, sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
margin:0;
}

/* Header */

.header{
text-align:center;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

/* Map container */

.map-container{
width:90%;
max-width:1000px;
margin:30px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* Map */

#map{
height:500px;
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">
Women Safety Heatmap
</div>

<div class="map-container">
<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Heatmap plugin -->

<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

var map = L.map('map').setView([17.3850,78.4867], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

// Crime intensity points
var heatPoints = [
[17.3850,78.4867,0.9],
[17.4000,78.4900,0.8],
[17.3700,78.4800,0.7],
[17.3950,78.4700,0.6],
[17.3900,78.4950,0.8],
[17.3750,78.4650,0.7]
];

// Heatmap layer
L.heatLayer(heatPoints,{
radius:25,
blur:20,
maxZoom:17
}).addTo(map);

</script>

</body>
</html>
