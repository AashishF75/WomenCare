
<!DOCTYPE html>
<html>
<head>
<title>SOS Emergency</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 40px;
  min-height: 100vh;
  background: linear-gradient(135deg, #f8fafc, #dbeafe, #fce7f3);
  background-attachment: fixed;
  background-size: cover;
}

h2 {
  text-align: center;
  color: #1e293b;
  margin-bottom: 35px;
  font-size: 58px;
  font-weight: bold;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.08);
}

h3 {
  color: #1e293b;
  margin-top: 45px;
  margin-bottom: 20px;
  font-size: 40px;
  font-weight: bold;
}

button {
  padding: 16px 30px;
  margin: 10px 10px 10px 0;
  border: none;
  border-radius: 14px;
  font-size: 20px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

button:hover {
  transform: translateY(-3px);
}

button:nth-of-type(1) {
  background: #dc3545;
  color: white;
}

button:nth-of-type(2) {
  background: #0d6efd;
  color: white;
}

button:nth-of-type(3) {
  background: #198754;
  color: white;
}

button:nth-of-type(4) {
  background: #212529;
  color: white;
}

#status {
  margin-top: 20px;
  font-size: 18px;
  font-weight: 500;
  color: #334155;
  background: rgba(255,255,255,0.8);
  backdrop-filter: blur(10px);
  padding: 18px 22px;
  border-radius: 14px;
  width: fit-content;
  min-width: 220px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
}

video {
  margin-top: 20px;
  width: 500px;
  border-radius: 18px;
  border: 4px solid white;
  box-shadow: 0 12px 28px rgba(0,0,0,0.12);
  background: black;
}
</style>

</head>

<body>

<h2>SOS Emergency</h2>

<button onclick="sendSOS()">🚨 Send Emergency Alert</button>

<br><br>

<button onclick="startVoiceSOS()">🎤 Voice SOS</button>

<p id="status"></p>

<h3>Panic Camera</h3>

<button onclick="startRecording()">📹 Start Recording</button>
<button onclick="stopRecording()">⏹ Stop Recording</button>

<br><br>

<video id="video" width="400" autoplay muted></video>

<script src="/socket.io/socket.io.js"></script>

<script>

const api = window.location.origin;
const socket = io(api);

let latitude = null;
let longitude = null;

function getLocation(){
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        latitude = pos.coords.latitude;
        longitude = pos.coords.longitude;
        resolve({ latitude, longitude });
      },
      ()=> reject("❌ Allow location access")
    );
  });
}

/* ---------------- SOS ---------------- */

async function sendSOS(){
  try {

    const loc = await getLocation();

    document.getElementById("status").innerText =
      "📍 Location: " + loc.latitude + ", " + loc.longitude;

    await fetch(api + "/sos", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(loc)
    });

    document.getElementById("status").innerText =
      "🚨 SOS sent! Recording for 10 seconds...";

    await startRecording();

    setTimeout(() => {
      stopRecording();
    }, 10000);

  } catch(err){
    document.getElementById("status").innerText = err;
  }
}

/* ---------------- VOICE SOS ---------------- */

function startVoiceSOS(){
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    alert("Not supported");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.continuous = true;

  recognition.start();

  document.getElementById("status").innerText =
    "🎤 Say 'help' or 'sos'";

  recognition.onresult = (event)=>{
    const speech =
      event.results[event.results.length-1][0].transcript.toLowerCase();

    if(speech.includes("help") || speech.includes("sos")){
      recognition.stop();
      sendSOS();
    }
  };
}

/* ---------------- CAMERA ---------------- */

let mediaRecorder;
let recordedChunks = [];
let cameraStream;

async function startRecording(){

  try {

    if(latitude === null){
      await getLocation();
    }

    cameraStream = await navigator.mediaDevices.getUserMedia({
      video:true,
      audio:true
    });

    document.getElementById("video").srcObject = cameraStream;

    mediaRecorder = new MediaRecorder(cameraStream);
    recordedChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if(e.data.size > 0){
        recordedChunks.push(e.data);
      }
    };

    mediaRecorder.start(1000);

    console.log("🎥 Recording started");

  } catch(err){
    console.log(err);
    document.getElementById("status").innerText =
      "❌ Camera permission denied";
  }
}

/* ---------------- STOP ---------------- */

function stopRecording(){

  if(!mediaRecorder) return;

  mediaRecorder.stop();

  mediaRecorder.onstop = async ()=>{

    if(recordedChunks.length === 0){
      document.getElementById("status").innerText =
        "❌ Recording failed";
      return;
    }

    const blob = new Blob(recordedChunks, {
      type: "video/webm; codecs=vp8"
    });

    console.log("📦 Video size:", blob.size);

    const formData = new FormData();
    formData.append("video", blob, "video.webm");
    formData.append("location", latitude + "," + longitude);

    try {

      const res = await fetch(api + "/upload-recording",{
        method:"POST",
        body:formData
      });

      const data = await res.json();
      console.log("✅ Upload:", data);

      document.getElementById("status").innerText =
        "✅ Recording uploaded successfully";

    } catch(err){
      console.log("❌ Upload error:", err);
      document.getElementById("status").innerText =
        "❌ Upload failed";
    }
  };

  if(cameraStream){
    cameraStream.getTracks().forEach(t=>t.stop());
  }
}

</script>

</body>
</html>
